<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Alexandria</title>
    <style>
        body {
            font-family: sans-serif;
            width: 380px;
            padding: 15px;
            text-align: center;
            background: #f9fafb;
            margin: 0;
        }

        h3 {
            margin-top: 0;
        }

        button {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 14px;
        }

        button:hover {
            background-color: #333;
        }

        #status {
            margin-top: 10px;
            font-size: 13px;
            color: #555;
            font-style: italic;
        }

        /* The critical UI component */
        #summaryBox {
            margin-top: 15px;
            text-align: left;
            font-size: 13px;
            line-height: 1.6;
            color: #111;
            max-height: 350px;
            overflow-y: auto;
            padding: 12px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #ddd;
            display: none;
        }
    </style>
</head>

<body>
    <h3>🌿 Alexandria</h3>
    <button id="summarizeBtn">Summarize This Video</button>
    <div id="status"></div>

    <div id="summaryBox"></div>

    <script src="popup.js"></script>
</body>

</html>
